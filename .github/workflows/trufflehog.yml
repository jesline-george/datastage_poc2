name: TruffleHog Scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (full filesystem scan)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/trufflesecurity/trufflehog:latest filesystem /repo --exclude-paths=/repo/.github/trufflehog-exclude.txt --config=/repo/.github/trufflehog-custom.yaml --results=unverified,verified --json --fail > trufflehog-report.json

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json
      parseSecretsReport:
    name: Parse TruffleHog report and format output
    needs: [scan]
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Download scan-artifact artifact
        uses: actions/download-artifact@v4
        with:
          name: scan-artifact
          path: ./scanreport

      - name: List downloaded files (debug)
        run: ls -R ./scanreport

      - name: Extract findings from JSON and format as Markdown
        id: extract-findings
        run: |
          set -e
          JSON=./scanreport/trufflehog-report.json
          if [ ! -f "$JSON" ]; then
            echo "::warning::trufflehog-report.json not found!"
            echo "md=No trufflehog-report.json found." >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 .github/scripts/extract_secrets.py "$JSON" findings.md
          echo '---'
          cat findings.md
          echo "md<<EOF" >> $GITHUB_OUTPUT
          cat findings.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload formatted findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-findings-report
          path: findings.md

      - name: Comment findings summary on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const md = `${{ steps.extract-findings.outputs.md }}`;
            if (md && context.payload.pull_request) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body: md
              });
            }
