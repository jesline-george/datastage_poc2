name: TruffleHog Scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (full filesystem scan)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --exclude-paths=/repo/.github/trufflehog-exclude.txt \
            --config=/repo/.github/trufflehog-custom.yaml \
            --results=unverified,verified
            --json > trufflehog-report.json

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json
